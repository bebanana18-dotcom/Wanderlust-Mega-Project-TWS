apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.frontend.name }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      containers:
        - name: {{ .Values.frontend.name }}
          # digest injected by pipeline: repository@sha256:abc123
          image: "{{ .Values.frontend.image.repository }}@{{ .Values.frontend.image.digest }}"
          ports:
            - containerPort: {{ .Values.frontend.port.container }}
