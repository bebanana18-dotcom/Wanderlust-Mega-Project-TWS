apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  # ── Rolling Update Strategy ───────────────────────────────
  strategy:
    type: RollingUpdate  # Result: zero-downtime deploys. Always.
    rollingUpdate:
      maxUnavailable: 0  # maxUnavailable: 0  → never kill old pod before new one is ready
      maxSurge: 1 # maxSurge: 1  → allow 1 extra pod during rollout
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
        - name: {{ .Values.backend.name }}
          # digest injected by pipeline: repository@sha256:abc123
          image: "{{ .Values.backend.image.repository }}@{{ .Values.backend.image.digest }}"
          ports:
            - containerPort: {{ .Values.backend.port.container }}
           # ── Resources ──────────────────────────────────────
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: {{ .Values.backend.port.container }}
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}
