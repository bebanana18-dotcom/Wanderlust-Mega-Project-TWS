# =============================================================================
# Wanderlust — Helm values
# Lives at repo root, next to Jenkinsfile.
#
# WHAT TO EDIT HERE:
#   - replicas, ports, storage sizes, ingress config, image versions
#
# WHAT NOT TO EDIT HERE:
#   - image digests — those are injected by the pipeline via --set
# =============================================================================

global:
  namespace: wanderlust
# -----------------------------------------------------------------------------
# Backend
# -----------------------------------------------------------------------------
backend:
  name: backend
  replicas: 2
  image:
    repository: us-central1-docker.pkg.dev/piyush-gcp/wanderlust-repo/wanderlust-backend-beta
    # digest is injected by Jenkins pipeline via --set backend.image.digest=...
    digest: "sha256:8aebf00f475bf1c82779cfec24a25b2a73b356d1d229cd49ebd7a2ff89088d51"
  port:
    container: 8080
    service: 80
  service:
    type: NodePort
# -----------------------------------------------------------------------------
# Frontend
# -----------------------------------------------------------------------------
frontend:
  name: frontend
  replicas: 1
  image:
    repository: us-central1-docker.pkg.dev/piyush-gcp/wanderlust-repo/wanderlust-frontend-beta
    # digest is injected by Jenkins pipeline via --set frontend.image.digest=...
    digest: "sha256:450e3ba70b5ba0507a73d219989311eaf8aa018a835738ed255fb31bc01a1111"
  port:
    container: 80
    service: 80
  service:
    type: NodePort
# -----------------------------------------------------------------------------
# MongoDB
# -----------------------------------------------------------------------------
mongo:
  name: mongo
  replicas: 1
  image:
    repository: mongo
    tag: "7.0" # always pin a version — "latest" is how you get paged at 3am
  port:
    container: 27017
    service: 27017
  storage:
    size: 10Gi
    storageClass: standard-rwo
    mountPath: /data/db
# -----------------------------------------------------------------------------
# Redis
# -----------------------------------------------------------------------------
redis:
  name: redis
  replicas: 1
  image:
    repository: redis
    tag: "7.2" # pinned — same reason as above
  port:
    container: 6379
    service: 6379
  storage:
    size: 2Gi
    storageClass: standard-rwo
    mountPath: /data
# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  name: wanderlust-ingress
  class: gce
  staticIpName: gke-nginx-global-ip
